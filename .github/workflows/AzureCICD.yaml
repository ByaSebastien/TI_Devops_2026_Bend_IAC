name: cicd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v6
          - name: Set up Dotnet
            uses: actions/setup-dotnet@v5
            with:
              dotnet-version: 10.x
          - name: Restore dependencies
            run: dotnet restore
          - name: Build
            run: dotnet build
          - name: Publish
            run: dotnet publish --configuration Release --output ./publish
          - name: Upload artifact
            uses: actions/upload-artifact@v7
            with:
              name: build
              path: ./publish

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
          - name: Download artifact
            uses: actions/download-artifact@v8
            with:
              name: build
              path: ./publish
          - name: Login to Azure
            uses: azure/login@v3
            with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}
          - name: Deploy to Azure
            uses: azure/webapps-deploy@v3
            with:
              app-name: 'devops-2026-bend'
              package: './publish'
